<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canal Fraternidade Overlay</title>

  <script>
    const imagens = [
      'banner/banner1.png',
      'banner/banner2.png',
      'banner/banner3.png',
      'banner/banner4.png'
    ];

    let atual = 0;

    function trocarImagem() {
      atual = (atual + 1) % imagens.length;
      document.getElementById('banner').src = imagens[atual];
    }

    setInterval(trocarImagem, 10000); // troca a cada 10 segundos
  </script>
</head>

<body style="margin:0; background:transparent; overflow:hidden;">

  <img
    id="banner"
    src="banner/banner1.png"
    style="
      position:fixed;
      top:20px;
      right:20px;
      width:320px;
      height:auto;
    "
  >

</body>
</html>
