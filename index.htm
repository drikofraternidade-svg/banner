<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canal Fraternidade Overlay</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

.banner{

    width:100%;
    height:90px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 30px;

    box-sizing:border-box;

    background:rgba(10,10,10,.72);

    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,.08);

}

.left{

display:flex;
align-items:center;
gap:18px;

}

.youtube{

width:52px;

}

.text{

display:flex;
flex-direction:column;

}

.title{

color:white;

font-size:24px;

font-weight:700;

letter-spacing:.5px;

}

.url{

color:#ff3b30;

font-size:17px;

}

.right{

display:flex;
align-items:center;
gap:18px;

}

#qrcode{

padding:6px;

background:white;

border-radius:10px;

box-shadow:0 0 18px rgba(255,255,255,.2);

}

.scan{

color:white;

font-size:15px;

}

</style>

</head>

<body>

<div class="banner">

<div class="left">

<img class="youtube" src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">

<div class="text">

<div class="title">
Canal Fraternidade - Cortes
</div>

<div class="url">
youtube.com/@canalfraternidadecortes
</div>

</div>

</div>

<div class="right">

<div class="scan">
INSCREVA-SE AQUI
</div>

<div id="qrcode"></div>

</div>

</div>

<script>

new QRCode(document.getElementById("qrcode"),{

text:"https://www.youtube.com/@canalfraternidadecortes",

width:72,

height:72,

colorDark:"#000000",

colorLight:"#ffffff",

correctLevel:QRCode.CorrectLevel.H

});

</script>

</body>
</html>
