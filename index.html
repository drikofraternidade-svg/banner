<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal Fraternidade Overlay</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
}

#banner{
    position:fixed;
    top:20px;
    right:20px;
    width:320px;
    height:auto;
}
</style>

</head>

<body>

<img id="banner" src="img/banner1.png" alt="Banner">

<script>
const banners = [
  "img/banner1.png",
  "img/banner2.png",
  "img/banner3.png",
  "img/banner4.png"
];

// Pré-carrega todas as imagens
banners.forEach(src => {
  const img = new Image();
  img.src = src;
});

let atual = 0;
const banner = document.getElementById("banner");

setInterval(() => {
  atual = (atual + 1) % banners.length;
  banner.src = banners[atual];
}, 10000);
</script>
    
</body>
</html>
