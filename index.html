<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Canal Fraternidade Overlay</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:transparent;
font-family:Arial,Helvetica,sans-serif;
}

.banner{

width:100%;
height:90px;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 30px;

box-sizing:border-box;

background:rgba(10,10,10,.72);

backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,.08);

transition:
opacity .8s ease,
transform .8s ease;

transform:translateY(0);

}

.left{

display:flex;
align-items:center;
gap:18px;

}

.icon{

width:52px;
height:52px;
object-fit:contain;

}

.text{

display:flex;
flex-direction:column;

}

.title{

color:white;
font-size:24px;
font-weight:bold;

}

.url{

color:#ff4040;
font-size:17px;

}

.right{

display:flex;
align-items:center;
gap:18px;

}

.scan{

color:white;
font-size:15px;
font-weight:bold;

}

#qrcode{

padding:6px;
background:white;
border-radius:10px;
box-shadow:0 0 15px rgba(255,255,255,.25);

}

.fade{

opacity:0;
transform:translateY(-10px);

}

</style>

</head>

<body>

<div class="banner" id="banner">

<div class="left">

<img id="icon" class="icon">

<div class="text">

<div id="title" class="title"></div>

<div id="url" class="url"></div>

</div>

</div>

<div class="right">

<div id="scan" class="scan"></div>

<div id="qrcode"></div>

</div>

</div>

<script>

const cards=[

{

title:"Canal Fraternidade",
url:"youtube.com/@canalfraternidade",
link:"https://www.youtube.com/@canalfraternidade",
icon:"https://cdn.simpleicons.org/youtube/FF0000",
scan:"▶ ASSISTA AGORA"

},

{

title:"Canal Fraternidade Cortes",
url:"youtube.com/@canalfraternidadecortes",
link:"https://www.youtube.com/@canalfraternidadecortes",
icon:"https://cdn.simpleicons.org/youtube/FF0000",
scan:"🎬 VEJA OS CORTES"

},

{

title:"WhatsApp Canal",
url:"Fale conosco",
link:"https://api.whatsapp.com/send/?phone=5517991085514",
icon:"https://cdn.simpleicons.org/whatsapp/25D366",
scan:"💬 FALE CONOSCO"

},

{

title:"Óleo Essencial NUTRATOP",
url:"Ganhe Desconto",
link:"https://www.mundomagnetico.com.br/qusm3hhv3-/oleo-essencial-de-hortela-concentrado-nutratop-menta-piperita",
icon:"https://cdn.awsli.com.br/2500x2500/1961/1961055/produto/260633494/-leo-de-hortel-2026-jsnx9tzt6e.jpg",
scan:"🌿 APROVEITE O DESCONTO"

}

];

let atual=0;

const banner=document.getElementById("banner");
const titulo=document.getElementById("title");
const endereco=document.getElementById("url");
const icone=document.getElementById("icon");
const scan=document.getElementById("scan");
const qr=document.getElementById("qrcode");

function atualizarCard(){

const card=cards[atual];

titulo.textContent=card.title;
endereco.textContent=card.url;
icone.src=card.icon;
scan.textContent=card.scan;

qr.innerHTML="";

new QRCode(qr,{

text:card.link,
width:72,
height:72,
colorDark:"#000000",
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H

});

}
// Pré-carrega os ícones para evitar atraso na troca
cards.forEach(card=>{
    const img=new Image();
    img.src=card.icon;
});

// Exibe o primeiro card
atualizarCard();

// A cada 20 segundos faz a transição
setInterval(()=>{

    // Fade de saída
    banner.classList.add("fade");

    // Aguarda o fade terminar
    setTimeout(()=>{

        // Próximo card
        atual++;

        if(atual>=cards.length){
            atual=0;
        }

        // Atualiza o conteúdo
        atualizarCard();

        // Fade de entrada
        banner.classList.remove("fade");

    },800);

},20000);

</script>

</body>
</html>
